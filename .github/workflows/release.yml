name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxcb1-dev libxkbcommon-dev

      - uses: Swatinem/rust-cache@v3
        with:
          workspaces: cli
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --manifest-path cli/Cargo.toml --target ${{ matrix.target }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          cd cli/target/${{ matrix.target }}/release
          7z a ../../../map_info-${{ matrix.target }}.zip map_info.exe

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd cli/target/${{ matrix.target }}/release
          tar czf ../../../map_info-${{ matrix.target }}.tar.gz map_info

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: map_info-${{ matrix.target }}
          path: cli/map_info-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*
